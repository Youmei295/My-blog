name: Deploy to Azure Storage

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Upload to Azure
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload-batch --account-name myblogyoumei --auth-mode key -d '$web' -s . --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
